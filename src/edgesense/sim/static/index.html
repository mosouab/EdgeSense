<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EdgeSense Operator Console</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="header">
    <div class="brand">
      <span class="logo">⚙</span>
      <span class="title">EdgeSense <em>operator console</em></span>
    </div>
    <div class="controls">
      <label class="control">
        <span>Asset</span>
        <select id="source-select"></select>
      </label>
      <label class="control">
        <span>Calibration samples</span>
        <input id="calib-input" type="number" min="500" step="500" value="20000" />
      </label>
      <label class="control">
        <span>Speed ×</span>
        <select id="speed-select">
          <option value="1">1×</option>
          <option value="10">10×</option>
          <option value="60">60×</option>
          <option value="600" selected>600×</option>
          <option value="3000">3000×</option>
        </select>
      </label>
      <button id="btn-start" class="btn primary">Start</button>
      <button id="btn-pause" class="btn">Pause</button>
      <button id="btn-stop" class="btn">Stop</button>
    </div>
  </header>

  <section class="phase-strip">
    <div class="phase-pill" id="phase-pill"><span id="phase-name">idle</span></div>
    <div class="progress"><div id="progress-bar" class="bar"></div></div>
    <span id="phase-detail" class="phase-detail">awaiting start</span>
  </section>

  <main class="grid">
    <section class="card sensors">
      <h2>Live sensor traces</h2>
      <div class="sensor-grid">
        <canvas id="sensor-0"></canvas>
        <canvas id="sensor-1"></canvas>
        <canvas id="sensor-2"></canvas>
        <canvas id="sensor-3"></canvas>
      </div>
      <p class="sub" id="sensor-labels"></p>
    </section>

    <section class="card scores">
      <h2>Anomaly score</h2>
      <canvas id="score-chart"></canvas>
      <p class="sub"><span class="legend-box"></span> Score (smoothed) &nbsp;
        <span class="legend-box threshold"></span> Deployable threshold</p>
    </section>

    <section class="card health">
      <h2>Health Score</h2>
      <div class="gauge">
        <svg viewBox="0 0 200 110">
          <path d="M10,100 A90,90 0 0,1 190,100" fill="none" stroke="#1f2933" stroke-width="14" stroke-linecap="round"/>
          <path id="health-arc" d="M10,100 A90,90 0 0,1 190,100" fill="none" stroke-width="14" stroke-linecap="round" />
        </svg>
        <div class="gauge-value">
          <span id="health-value">—</span>
          <em>%</em>
        </div>
      </div>
      <p class="sub" id="health-detail">awaiting calibration</p>
    </section>

    <section class="card alert">
      <h2>Alert state</h2>
      <div id="alert-pill" class="alert-pill ok">
        <span class="dot"></span>
        <span id="alert-text">All clear</span>
      </div>
      <dl class="metrics">
        <div><dt>Source</dt><dd id="src-name">—</dd></div>
        <div><dt>Phase</dt><dd id="phase-meta">—</dd></div>
        <div><dt>Anomaly score</dt><dd id="score-meta">—</dd></div>
        <div><dt>Threshold</dt><dd id="threshold-meta">—</dd></div>
        <div><dt>Simulated time</dt><dd id="time-meta">—</dd></div>
      </dl>
    </section>
  </main>

  <script src="/static/dashboard.js"></script>
</body>
</html>
